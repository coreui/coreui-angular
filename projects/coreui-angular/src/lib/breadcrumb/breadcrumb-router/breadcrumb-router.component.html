<c-breadcrumb class="m-0">
  @for (breadcrumb of breadcrumbs(); track breadcrumb; let last = $last) {
    @if (breadcrumb?.label && (breadcrumb?.url?.slice(-1) === '/' || last)) {
      <c-breadcrumb-item
        [active]="last"
        [url]="$safeNavigationMigration(breadcrumb?.url)"
        [attribs]="$safeNavigationMigration(breadcrumb?.attributes)"
        [linkProps]="$safeNavigationMigration(breadcrumb?.linkProps)"
      >
        {{ breadcrumb?.label }}
      </c-breadcrumb-item>
    }
  }
</c-breadcrumb>
