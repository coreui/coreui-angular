@if (contentProgressBars()?.length) {
  <ng-container *ngTemplateOutlet="defaultContent" />
} @else {
  @let pbd = progressBarDirective;
  <c-progress-bar
    [animated]="$safeNavigationMigration(pbd?.animated())"
    [variant]="$safeNavigationMigration(pbd?.variant())"
    [color]="$safeNavigationMigration(pbd?.color())"
    [value]="barValue()"
  >
    <ng-container *ngTemplateOutlet="defaultContent" />
  </c-progress-bar>
}

<ng-template #defaultContent>
  <ng-content />
</ng-template>
