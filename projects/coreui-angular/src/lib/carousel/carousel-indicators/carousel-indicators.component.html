@let tmpl = templates();
@let activeItem = active();
<ng-container *ngTemplateOutlet="tmpl['carouselIndicatorsTemplate'] || defaultCarouselIndicatorsTemplate; context: {$implicit: items, active: activeItem}" />

<ng-template #defaultCarouselIndicatorsTemplate>
  @for (item of items; track item; let i = $index) {
    <button
      [attr.data-coreui-target]="i"
      type="button"
      (click)="onClick(i)"
      [class]="{ active: activeItem === i }"
      [attr.aria-current]="activeItem === i ? 'true' : null">
    </button>
  }
</ng-template>
